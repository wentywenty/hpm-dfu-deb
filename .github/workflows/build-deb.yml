name: Build HPM Manufacturing Tool Debian Package

on:
  push:
  workflow_dispatch:

jobs:
  build:
    name: Build amd64 package
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download HPMicro Manufacturing Tool
        run: |
          wget -q https://github.com/hpmicro/hpm_manufacturing_tool/releases/download/v0.6.0/HPMicro_Manufacturing_Tool_v0.6.0.tar.gz
          tar -xzf HPMicro_Manufacturing_Tool_v0.6.0.tar.gz

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential debhelper

      - name: Build Debian package
        run: |
          mkdir -p output
          dpkg-buildpackage -us -uc -b
          mv ../*.deb output/
          VERSION=$(dpkg-parsechangelog -S Version | cut -d'-' -f1)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Upload Debian package
        uses: actions/upload-artifact@v4
        with:
          name: hpm-manufacturing-tool-${{ env.VERSION }}-amd64
          path: output/*.deb

      - name: Release to GitHub
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: output/*.deb
